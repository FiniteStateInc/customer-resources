name: Create fs-cli Release

on:
  push:
    tags: ['fs-cli-v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # fs-cli-v2.0.10
          VERSION="${TAG#fs-cli-}"            # v2.0.10
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp 02-ci-cd-automation/fs-cli/latest/fs-cli-* release-assets/
          cp 02-ci-cd-automation/fs-cli/latest/checksums.txt release-assets/

      - name: Delete existing release if re-promoting
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "fs-cli ${{ steps.version.outputs.version }}" \
            --notes "## fs-cli ${{ steps.version.outputs.version }}

Platform binaries and checksums for fs-cli ${{ steps.version.outputs.version }}.

### Install
\`\`\`sh
curl -fsSL https://raw.githubusercontent.com/FiniteStateInc/customer-resources/main/02-ci-cd-automation/fs-cli/install.sh | sh
\`\`\`

### Assets
| File | Platform |
|------|----------|
| \`fs-cli-linux-amd64\` | Linux x86_64 |
| \`fs-cli-linux-arm64\` | Linux ARM64 |
| \`fs-cli-darwin-amd64\` | macOS Intel |
| \`fs-cli-darwin-arm64\` | macOS Apple Silicon |
| \`fs-cli-windows-amd64.exe\` | Windows x86_64 |
| \`checksums.txt\` | SHA-256 checksums |
" \
            release-assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        run: |
          # Delete existing latest release
          gh release delete "fs-cli-latest" --yes 2>/dev/null || true

          # Force-move the latest tag
          git tag -f "fs-cli-latest"
          git push origin "fs-cli-latest" --force

          gh release create "fs-cli-latest" \
            --title "fs-cli latest (${{ steps.version.outputs.version }})" \
            --notes "Always points to the most recent fs-cli release. Currently ${{ steps.version.outputs.version }}.

To pin to a specific version, use the \`fs-cli-vX.Y.Z\` release instead.
" \
            release-assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

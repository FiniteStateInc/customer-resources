releases:
  - version: "2.0.1"
    date: "2026-07-13"
    changes:
      - report: "Exploitability Report"
        type: added
        description: "New **Exploitability Report** ŌĆö the first member of a new Exploitability Evidence report family. A standalone, evidence-backed CVE-exploitability dossier for internal/console use (`parameters.mode: internal`), consumed from a forge exploitability-dataset export via `--data-file` rather than a live query. It is `auto_run: false` and query-less, so it runs only via an explicit `fs-report run --recipe exploitability_report --data-file ŌĆ”`, and outputs HTML + PDF (no Markdown)."
      - report: "Exploitability Report (Shareable)"
        type: added
        description: "New **Exploitability Report (Shareable)** (`parameters.mode: external`, Briefing layout) ŌĆö the same dossier redacted for customers and regulators. It shares one transform with the internal recipe, is `--data-file`-driven and `auto_run: false`, and outputs HTML + PDF."
      - report: "Report Categories"
        type: added
        description: "New **Exploitability Evidence** report category ŌĆö a 5th `nav_category` (joining Executive, Investigation, Remediation, and Compliance). It surfaces across the web Report Launcher grouping, Report History rows and category-filter chips, category badges, a crimson accent (`#e11d48` nav token + report-header stripe), and a flask-conical launcher icon."
      - report: "CLI (--data-file)"
        type: changed
        description: "`--data-file` / `-df` extended for query-less **object recipes** (`transform_input: object`): these now consume the entire `--data-file` JSON document un-coerced (a forge exploitability-dataset export) instead of being flattened into a DataFrame. Such recipes are `auto_run: false` and error with an actionable contract message if run without `--data-file`."
      - report: "Exploitability Report"
        type: changed
        description: "Exploitability recipes now consume a forge-produced **exploitability-dataset/v2** export (up from v1). fs-report owns the schema (`fs_report/schemas/exploitability-dataset-v2.schema.json`) and validates it on load with actionable, path-prefixed errors. A single schema carries two fill-levels ŌĆö internal-complete vs. shareable-redacted ŌĆö and the transform dispatches on `schema_version`; a legacy v1 export still renders via a retained dual path until cutover."
      - report: "Exploitability Report"
        type: changed
        description: "Reworked into a standalone deliverable bucketed by pen-test verdict into a ┬¦0ŌĆō┬¦7 architecture: ┬¦0 identity header (degrades to a scope descriptor for portfolio runs), ┬¦1 decision summary with a bucket roll-up and Top-N prioritized actions grouped by shared remediation target, ┬¦2 must-fix EXPLOITABLE cards, ┬¦3 proven-not-affected (trust tiers High Ōēź 0.80 / Moderate 0.60ŌĆō0.79 / Low < 0.60), ┬¦4 tested-inconclusive, ┬¦5 an Affected-by-version compact table (CVE / component / severity / KEV flags / fix-version), ┬¦5b could-not-be-assessed, ┬¦6 method/honesty notes, and ┬¦7 provenance/replay. Evidence is prose-first, and supersession keyed on `finding_id` keeps same-CVE-different-component findings distinct (no bare-CVE collapse)."
      - report: "Exploitability Report (Shareable)"
        type: fixed
        description: "External/shareable mode now defensively re-strips **only** internal-only fields (every `card.internal` payload and each citation's `inline_excerpt`) while **never** redacting the proof itself ŌĆö `evidence_summary`, backport commit, crash signal/symbol, reachability fact, code locus, and replay chain all survive. Fixes the case where redaction had gutted the evidence on a real field delivery."
      - report: "Exploitability Report"
        type: fixed
        description: "Bucketed object-recipe output no longer shows **'0 records'** in the briefing header ŌĆö the engine now prefers a transform-supplied `record_count` over `len(main)` when the primary frame is empty (falling back to the length for v1-path transforms)."
      - report: "CRA Compliance"
        type: added
        description: "Three new recognized CRA exploit-maturity tiers ŌĆö **botnet**, **commercial**, and **reported** ŌĆö are now selectable via `--exploit-maturity`. All three are `exploitInfo`-token tiers with no server-side RSQL filter, so they honor `--unfilterable-tier-strategy` like `ransomware`/`threat_actor`, and the ­¤åĢ Newly Above Threshold snapshot-diff now detects their crossings."
      - report: "CRA Compliance"
        type: changed
        description: "The default `--exploit-maturity` threshold (recipe `cra_compliance.yaml`) widened from `kev,ransomware,threat_actor,weaponized` to additionally include **botnet**, so botnet-attributed findings are promoted above-threshold (­¤ōŗ Full Snapshot / ­¤åĢ Newly Above Threshold) by default. `poc`, `commercial`, and `reported` remain recognized but opt-in."
      - report: "CRA Compliance"
        type: changed
        description: "`--exploit-maturity` now **rejects unknown tier names at parse time** with exit code 2 (usage error) instead of silently shrinking the notification queue (e.g. the token `botnets` vs. the tier `botnet`), and it accepts tier names case-insensitively across the CLI, recipe YAML, and programmatic entry paths."
      - report: "CRA Compliance"
        type: changed
        description: "Report copy reframed as **triage, not a verdict** (HTML + Markdown). The SLA-breach banner, ­¤öź section callout, 'How to use this report' preamble, and report intro no longer say 'N potential actively-exploited vulnerabilities detected'; they now read 'N findings flagged for CRA review ŌĆö carrying a CISA/VulnCheck KEV signal ŌĆ” a triage list to investigate, NOT a determination that a vulnerability is actively exploited or reportable.' The recipe description was updated to match."
      - report: "CRA SRP Cascade"
        type: added
        description: "Three new CRA Article-14 SRP-cascade producer recipes ŌĆö **early_warning_notification** (24 h), **vulnerability_notification** (72 h), and **final_report** (14 d). They are `transform_input: object` recipes fed the forge exploitability-dataset/v2 export via `--data-file`, each emitting a `json_package` (`{stage, fields}`, plus a `meta` block on the early_warning_notification package; the JSON renderer writes `<recipe>.json`) that conforms to the vendored `cra-stages.schema.json` and is consumed by the fs-comply SPA. They replace the earlier single `--stage` generator (there is no `--stage` flag) ŌĆö all three run off one shared dataset, giving continuity by construction."
      - report: "CRA SRP Cascade"
        type: added
        description: "**operator_input pass-through**: the SRP recipes now prefer an assembler-injected top-level `operator_input` string over the derived placeholder for seven manufacturer-knowledge fields (`cra_product_class`, `annex_category`, `measures_taken`, `security_update`, `update_available_since`, `automatic_update`, `root_cause`), letting operator-authored answers flow into the Article-14 filing. `user_actions` and `actively_exploited` are deliberately excluded, and blank/non-string values degrade to the placeholder (never an empty or coerced authored string)."
      - report: "CRA SRP Cascade"
        type: changed
        description: "For direct `--data-file` runs, the scope flags `--cve` / `--component` / `--version` / `--project` / `--folder` now act as a **hard subject guardrail** (matching case-insensitively by id/name/label/folder-name): a scope that matches nothing raises `NoSubjectError` instead of silently picking the wrong subject, a multi-subject export emits an ambiguity warning, and a structurally invalid `--data-file` fails fast via `validate_dataset_v2` with an actionable contract error."
      - report: "CRA SRP Cascade"
        type: changed
        description: "The three SRP-cascade recipes are now **forge-audience** and no longer appear in the default `fs-report list recipes` or the web recipe sidebar (they remain resolvable by explicit `--recipe`, or via `list recipes --audience forge|all`). The web `/api/recipes` endpoint now filters to audience-`None`, which also hides the 4 pre-existing forge-consumer recipes (Customer Brief, Customer Brief Detailed, Assessment Overview, and the Workflow Summary variants) from the dashboard to match the CLI default."
      - report: "CRA SRP Cascade"
        type: fixed
        description: "SRP notifications no longer emit self-contradictory sealed pen-test verdict text: reachability and exploit-nature lines are now gated on an affirmative `verdict.kind` (`AFFECTED` / `AFFECTED_BY_VERSION`), so a `NOT_AFFECTED`/`INCONCLUSIVE` finding no longer renders 'confirmed reachable' or PoV crash text, and `vuln_nature`/`potential_impact` are sourced from the CVE description (falling back to weakness text) instead of the contradictory, truncated `verdict.reason_summary`."
      - report: "Triage Prioritization"
        type: added
        description: "Report pages gain per-row action buttons (**­¤Ä½ Jira**, **ŌÜæ Triage**, **Remediation**) that create real tracker/Jira tickets via a new serve-side `POST /api/tracker/tickets` endpoint against Customer API v0.3.0. Offers single / one-per-finding / one-per-component / one-for-all modes, groups the selection by project version (K versions = K tickets), confirms before creating more than one, and reports created keys, per-version failures, and platform degradation honestly."
      - report: "Triage Prioritization"
        type: changed
        description: "Ticket creation works **only under `--serve` with the server holding credentials** ŌĆö the manual browser-token connect mode is explicitly unsupported for ticket creation (the modal says so). Separately, the API proxy no longer masks an empty non-2xx response as `{ok: true}`, so a failed Jira availability ping now surfaces honestly instead of appearing successful."
      - report: "Autotriage (VEX apply)"
        type: changed
        description: "VEX status updates now send only the fields semantically valid for the chosen status ŌĆö `justification` for `NOT_AFFECTED`; `response` for `EXPLOITABLE`/`RESOLVED`/`RESOLVED_WITH_PEDIGREE`; neither for `IN_TRIAGE`/`FALSE_POSITIVE` ŌĆö removing the old workaround that force-filled `response=WILL_NOT_FIX` + `justification=CODE_NOT_PRESENT` on every PUT and stamped nonsensical dispositions. Applies to both the CLI/bulk apply path and the `--serve` web UI. **BREAKING for helix-backed deployments**: fs-report now follows the alloy `{status}`-only contract and surfaces a helix HTTP 400 rather than masking it, so helix users must pin to `release/1.9` until helix relaxes its schema."
      - report: "Autotriage (VEX apply)"
        type: changed
        description: "VEX application now uses the platform's native **bulk-set** endpoint for integer project-version/finding IDs (UUID / non-integer IDs still use single-PUT). Accordingly `--vex-concurrency` is redefined from 'parallel API requests' to 'parallel VEX-apply work units (1ŌĆō5)', metering concurrent bulk batches plus single-PUT fallbacks, and the CLI VEX summary now reports throughput as **items/s** instead of req/s."
      - report: "Autotriage (VEX apply)"
        type: fixed
        description: "Bulk VEX batch cap lowered from 5000 to **500** items (the platform's `BulkVexItem` `maxItems` limit); a 5000-item PUT tripped the client read timeout, so large re-triage runs (e.g. 6,382 updates on one project) now complete reliably via the 500-item bulk path."
      - report: "Configuration Analysis Triage"
        type: fixed
        description: "The recipe now sets an explicit `NOT_AFFECTED` justification on its VEX writes so its dispositions stay valid under the new status-gated body (it previously relied on the removed force-filled defaults)."
      - report: "Component List / Findings by Project"
        type: fixed
        description: "The **Group / namespace column** is now populated from the SBOM `bom-ref` or PURL (e.g. Maven `pkg:maven/group/name@version` or `group:artifact:version`) when the CycloneDX `group` field is absent, and engine-level SBOM group enrichment is no longer clobbered by the transform. Previously the Group column was frequently empty for these components."
      - report: "Command Center"
        type: removed
        description: "The KPI band drops the **'Active users / 30d'** tile (now three tiles instead of four) and the scan-queue version rows drop the per-version **'created by' author chip**, because `ScanV0.createdBy` is not populated on Customer API v0.3.0."
      - report: "Command Center"
        type: changed
        description: "Clicking a finished report deliverable now opens the report in a **new browser tab** instead of navigating away from the dashboard; the run canvas (`/run/{id}`) and error-log rows still open in the same tab."
      - report: "Command Center"
        type: fixed
        description: "The sticky run bar now docks flush beneath the fixed topbar when scrolling, instead of leaving a gap where scrolling content bled through above it."
      - report: "License Report / Component List / Findings by Project"
        type: fixed
        description: "Fixes **CST-795** ('License Report never finishes'). Per-version CycloneDX SBOM `group` lookups are now cached in the sqlite raw cache (key `sbom_group_lookup:{version_id}`, on a dedicated fingerprint-invalidated 7-day TTL independent of `--cache-ttl`'s row window), so repeat portfolio runs skip redundant full-SBOM downloads. Caching activates whenever a cache exists (any `--cache-ttl > 0`; the web UI defaults to 4 h), and the run log now prints 'N SBOM(s) fetched, M version(s) served from cache'. First-run cost is still one SBOM download per version."
      - report: "CRA Compliance & False Positive Analysis"
        type: fixed
        description: "A **Project column** is now rendered in CRA Compliance HTML/PDF across all five sections (SLA-Breach Risk, Newly Above Threshold, Re-emerged, Still in Triage, Full Snapshot) and in the False Positive Analysis HTML + Markdown candidates table, restoring parity with the XLSX/CSV so multi-project reports show which project each row belongs to."
      - report: "Scan Quality / Remediation Package"
        type: fixed
        description: "Both reports (including `--ai` / `--ai-prompts`) previously raised `ValueError` and produced no output on backends that issue UUID project/version IDs because IDs were cast with `int()`. IDs are now string-normalized (stripping a float `.0` suffix to protect large numeric legacy IDs), restoring these reports on UUID backends while preserving int-typed IDs in output columns on legacy backends."
      - report: "Web UI"
        type: fixed
        description: "Light-mode readability fixes: the pop-up toast notification (e.g. 'Run failed: Failed to fetch') no longer renders as unreadable black-on-black, and Builder step cards (`.wfb-step`) / compound section rows no longer appear as dark-navy blocks with near-black text in the light theme."
      - report: "Web UI (Builder)"
        type: fixed
        description: "Builder step reordering no longer scrambles the workflow at 6+ steps ŌĆö the drag DOM/model desync that made saved workflows run in a different order than displayed is fixed ŌĆö and dragging now autoscrolls the canvas on long lists, including the former statusbar dead zone at the bottom edge."
      - report: "fs-report run"
        type: added
        description: "New `--progress-file <path>` flag appends one JSON line per engine progress event (`run_start`; `recipe_start`/`recipe_complete` with 1-based index/total mirroring the web SSE payload; `section_start`/`section_complete` for compound children, 0-based, with success; `run_complete` with success), each stamped with `run_id` and a UTC ISO timestamp, so an external supervisor can tail live run progress from the plain CLI path. The stream is append-only (delimit runs by `run_id`) and best-effort (an uncreatable parent dir or failed write warns and disables itself, never aborting the run); consumers must not assume start/complete pairing ŌĆö `recipe_complete` fires from the engine loop's `finally`, so skipped recipes emit a completion with no matching start, and a missing `run_complete` line means the process died."
      - report: "fs-report run (--headless)"
        type: added
        description: "When a recipe's transform ran an LLM (`--ai` / `--ai-analysis`), its `stats` block in the `--headless` JSON summary now carries **`ai_usage`**: `{input_tokens, output_tokens, models: {<model-id>: {input_tokens, output_tokens}}}` ŌĆö raw provider-reported counts only (no pricing math), with a per-model breakdown because one run can use both the summary and component tiers. Compound bundles aggregate usage across AI-using children (billable usage survives a post-transform render failure). The key is absent (not empty) when no billable usage occurred ŌĆö no AI, a fully cache-served run, or a provider that reported no telemetry."
      - report: "Run Logs"
        type: fixed
        description: "Run logs (`~/.fs-report/logs/<date>_<run_id>.log`), the web SSE live-log stream, and the JSON-RPC bridge log handler now redact the active AI provider's API key (Anthropic / OpenAI / Gemini / Copilot, resolved via `--ai-provider` override or env auto-detect) and the `--compare-token`, in addition to the platform auth token. Redaction scrubs longest-token-first to avoid recoverable remnants and never breaks a run if key resolution fails ŌĆö closing a leak in the very log files support asks customers to upload for remote debugging."
      - report: "Run Logs"
        type: fixed
        description: "Closes the Copilot gap left by the redaction work above: a runtime-secret registry lets any credential minted mid-run be scrubbed by all already-attached log filters, so Copilot's short-lived exchanged bearer (and the GitHub gh-CLI / device-flow / cached-OAuth token spent to obtain it) are now redacted from run logs, the SSE stream, and the bridge. File handlers now always attach the redaction filter even when no static token is present."
      - report: "fs-report doctor"
        type: added
        description: "New `fs-report doctor` ŌĆö a read-only first-run preflight. It reports the fs-report / Python version; credentials present and their source (`--token`/`--domain` flag ŌåÆ env var ŌåÆ config file, token masked, using the run's `merge_config` precedence); domain normalization (scheme and trailing slash stripped; `https://tenant.io/` accepted); DNS resolution; API reachability + token validity (one `GET /public/v0/projects?limit=1` probe ŌĆö 401/403 ŌåÆ re-issue/tenant-migration hint, TLS cert errors ŌåÆ corporate-proxy CA hint, 429 ŌåÆ warning not failure, 200-non-JSON ŌåÆ captive-portal hint); and run-log-dir writability. Accepts `--token`/`--domain`; exit 0 = healthy (warnings allowed), 1 = any failure."
      - report: "fs-report run"
        type: added
        description: "Every `fs-report run` failure exit now prints `Full run log: ~/.fs-report/logs/<date>_<run_id>.log` on all failure paths once a run has started, so support can request the log file instead of screenshots. Pre-run validation failures (bad flags, missing credentials) have no run log and print none."
      - report: "setup.sh"
        type: fixed
        description: "`setup.sh` (shipped to customers via `.customer-include`) now installs pipx via the system package manager (sudo-guarded `apt`/`dnf`; root needs no sudo) instead of `pip install --user pipx`, which fails with `externally-managed-environment` on Debian 12+ / Ubuntu 23.04+ (PEP 668); it falls back to user-level pip on sudo-less / RHEL-without-EPEL hosts. README gained a PEP 668 note (`sudo apt install -y pipx && pipx ensurepath`) and a `doctor` pointer."
      - report: "fs-report list projects"
        type: fixed
        description: "Corrected the `--filter` example in `fs-report list projects --help` from the no-op `archived==false` to `archived==true` (help-string only; no behavior change)."
      - report: "Dependencies"
        type: changed
        description: "Security-focused dependency bump for 2.0.1 (repo source-scan findings dropped 99 ŌåÆ 43): starlette 0.52 ŌåÆ 1.3.1 (major ŌĆö powers `--serve`), fastapi 0.129 ŌåÆ 0.139, urllib3 2.7.0, python-multipart 0.0.32, plus idna / pygments / python-dotenv floors and a pydantic floor of `^2.9.0` (dev: pypdf `^6.13.3`, black, pytest). OSV fixed-in floors are now encoded in `pyproject.toml` so metadata installs can't select vulnerable versions. No CLI flags, reports, or behavior changed, and the full suite stayed green across the starlette major."
  - version: "2.0.0"
    date: "2026-06-01"
    changes:
      - report: "Executive Summary"
        type: added
        description: "Two new charts in a 2├Ś2 grid ŌĆö an Exploit Signals gauge (open findings carrying CISA KEV / VulnCheck KEV / real-exploit signals; the Real-exploits bar is a deliberate superset of the two KEV bars) and an Exploits Over Time line (real-exploit findings detected per period). All Executive Summary charts now read theme tokens for legible text in dark mode and re-theme live on the light/dark toggle."
      - report: "Executive Summary"
        type: changed
        description: "PDF is now generated by default alongside CSV/XLSX/HTML (requires `fs-report install-engine` for Chromium). The briefing shell gained a light/dark theme toggle."
      - report: "Findings by Project"
        type: removed
        description: "Dropped the CVSS v2 Vector column ŌĆö NVD stopped assigning CVSS v2 (~2016+), so it was ~always empty for modern data. CVSS v3 Vector is unchanged. The two exploit-signal count columns also got shorter headers (full descriptions remain in the cell tooltips)."
      - report: "CRA Compliance"
        type: changed
        description: "SLA-breach copy softened from 'actively-exploited' to 'potential actively-exploited' with guidance to investigate and disposition each finding (confirm affected vs NOT_AFFECTED/VEX) before treating the 24-hour ENISA clock as running. `VcKEV` is now correctly described as VulnCheck's KEV catalog (previously mislabeled 'verified-compromise')."
      - report: "Reports (general)"
        type: fixed
        description: "Dark-mode contrast + layout fixes: Executive Dashboard severity counts render as colored text (legible in dark, was white-on-fill), the Scan Analysis VULNERABILITY_ANALYSIS badge is legible in dark, CVE Component Evidence caps long CVE / evidence-path lists to ~4 lines, and the Security Progress legend no longer overlaps the date axis."
      - report: "PDF Rendering"
        type: changed
        description: "PDF rendering switched from WeasyPrint to Playwright + Chromium. Chart.js charts that previously rendered as blank regions in WeasyPrint PDFs now render live ŌĆö Chromium executes JavaScript before the page is captured. Public API (`PDFRenderer().render(recipe, report_data, output_path)`) is unchanged; engine swap is invisible to callers."
      - report: "PDF Rendering"
        type: added
        description: "New `fs-report install-engine` subcommand pre-installs the Chromium binary used by the PDF renderer. Useful for CI runners, Docker images, and any deployment where the ~150 MB first-render download is undesirable. Pass `--with-deps` on bare-metal Linux to also install Chromium's system dependencies (libnss3, libatk-bridge2.0-0, etc.); no-op on macOS. Chromium also downloads lazily on first PDF render if not pre-staged."
      - report: "PDF Rendering"
        type: removed
        description: "WeasyPrint is removed entirely. No engine toggle, no fallback. The `HTMLRenderer.render(pdf_target=True)` kwarg is removed ŌĆö callers must use `render_mode=RenderMode.PDF` instead. Template branches on `{% if pdf_target %}` / `{% if fragment_mode %}` are removed; templates now branch on `render_mode` (a `StrEnum` so Jinja literal comparisons like `{% if render_mode == 'fragment' %}` work)."
      - report: "PDF Rendering"
        type: changed
        description: "Customer Brief's page footer (`Page X of Y` band) migrates from WeasyPrint CSS `@page @bottom-center` markers to Chromium's `footerTemplate` HTML parameter, surfaced via the new `output.pdf_footer_template` field on the recipe YAML. `OutputConfig` also gains `has_inline_charts: bool` (signals the chart-readiness beacon to the PDF renderer) and `pdf_margin: dict[str, str] | None` (per-edge margin overrides). Visual layout of existing PDFs is preserved."
      - report: "PDF Rendering"
        type: changed
        description: "BREAKING for air-gapped customers: chart-bearing PDF recipes (Customer Brief, Customer Brief Detailed, Executive Summary, Assessment Overview, Findings by Project chart cards, etc.) require network access to `cdn.jsdelivr.net` for Chart.js until a future library-packaging follow-on bundles the CDN libraries into the wheel. Chart-free PDFs (CRA Compliance, Findings by Project tabular sheets, False Positive Analysis, CVE Component Evidence, Remediation Package, Workflow Summary) render fully offline. Customers who need offline chart-in-PDF rendering should stay on `release/1.9` (WeasyPrint maintenance line) until that release ships."
      - report: "API Client"
        type: removed
        description: "Helix (v2) backend auto-detection and all v2-specific branches have been removed. fs-report now sends the same wire requests to every backend (\"alloy contract\"). Specifically gone: the `_detect_v2()` probe, the `APIClient(is_v2=...)` kwarg, the page-size cap at `limit=1000` (now always `10000`), the `/versions/{vid}/findings` per-version fallback in `ReportEngine._fetch_with_version_batching`, the `versionIdŌåöprojectVersion` RSQL rewrite, the v2 short-page early-exit in pagination, and the `bssMessage`ŌåÆ`errorMessage` normalization in `SQLiteCache._trim_record` and `scan_analysis.generate_scan_metrics`."
      - report: "API Client"
        type: changed
        description: "BREAKING for customers running fs-report against the helix v2 backend: with the compat layer removed, recipes will hard-fail on helix's `limit Ōēż 1000` validator (HTTP 400) until the helix team raises the cap, and Scan Analysis's `errorMessage` column will be empty for failed helix scans (helix calls the field `bssMessage`). See `docs/2026-06-01-helix-divergence-report.md` for the full divergence list. Helix-backed customers should pin to `release/1.9` until helix reaches contract parity with alloy."
      - report: "API Client"
        type: changed
        description: "Permanent HTTP client errors (4xx other than the documented 404 end-of-pagination signal) now raise instead of returning a silent empty/partial result from paginated fetchers. Previously, a permanent error like helix's `400 \"Number must be less than or equal to 1000\"` was logged and the paginator returned `[]`, producing blank reports without surfacing the cause. Recipes now fail fast with the wire error attached."
      - report: "API Client"
        type: removed
        description: "BREAKING for direct callers of `APIClient`: the `is_v2: bool | None` constructor kwarg is gone. Callers that pass it explicitly will get `TypeError`. There is no replacement ŌĆö backend behavior is no longer client-selected. Recipe code paths inside fs-report are unaffected (no caller passed `is_v2` outside the deleted detection logic)."
  - version: "1.9.9"
    date: "2026-05-26"
    changes:
      - report: "CRA Compliance"
        type: added
        description: "5-section morning-queue redesign for EU CRA Article 14 daily automation. New sections: ­¤öź SLA-Breach Risk, ­¤åĢ Newly Above Threshold, ­¤öü Re-emerged, ŌÅ░ Still in Triage, ­¤ōŗ Full Snapshot. Hybrid delta detection combines `/cves/updates` maturity transitions with client-side snapshot-diff for KEV/ransomware/threat-actor signals. 9 new CRA-specific CLI flags including `--since` (delta window), `--exploit-maturity` (active tier set), `--snapshot-diff` (state persistence), `--with-triage-age` (opt-in per-finding `/activity` fan-out)."
      - report: "CRA Compliance"
        type: added
        description: "Action-driven KPI cards replace the original P1/P2/P3/KEV bucket counts: Period (humanized `--since` window), Total Findings, ­¤öź OVERDUE, DUE_SOON, Unknown Clock, Reachable (binary scans only ŌĆö auto-hidden for source projects), In Triage. OVERDUE/DUE_SOON/Unknown counts cover all queue sections (not just ­¤öź) so headline numbers match what's visible in the tables. Note: Total Findings is a dedup'd count, so it doesn't equal a naive sum of all 5 section rows (­¤ōŗ re-shows queue rows per the AŌł¬B audit-appendix model)."
      - report: "CRA Compliance"
        type: added
        description: "Breach-clock columns on every queue section, not just ­¤öź. ­¤öź / ­¤åĢ / ­¤öü / ŌÅ░ carry the full `breach_status` + `hours_until_cra_due` + `cra_notification_deadline` set; ­¤ōŗ Full Snapshot carries the slimmer `breach_status` + `cra_notification_deadline` pair (audit-appendix view). For ­¤åĢ and ­¤öü the 24-hour clock anchors on the report's run time (customer is being made aware via this report); for ­¤öź / ŌÅ░ / ­¤ōŗ it anchors on the platform's detected timestamp."
      - report: "CRA Compliance"
        type: added
        description: "KEV Source column on ­¤öź distinguishes CISA-catalog hits (`CISA`), VulnCheck's broader KEV catalog (`VcKEV`), and both (`CISA+VcKEV`). Threat Actors column on ­¤öź / ­¤åĢ / ­¤öü populated from VulnCheck data via per-finding `/exploits` fan-out with rate-limit retry/backoff."
      - report: "CRA Compliance"
        type: fixed
        description: "­¤öź OVERDUE counts are no longer falsely UNKNOWN for the majority of platform-KEV findings. fs-report now reads the platform's `detected` timestamp as the CRA awareness anchor when CISA's `dateAdded` isn't available ŌĆö VcKEV-only rows (most of the inKev set on real data) now get computable CRA Article 14 deadlines."
      - report: "CRA Compliance"
        type: removed
        description: "P1/P2/P3 priority bucket column and `--cra-priority-thresholds` CLI flag. Prioritization within each section is preserved via the existing severity ŌåÆ CVSS ŌåÆ EPSS sort. Migration: if you were keying on the `priority` column from CSV/XLSX, sort by those three fields instead."
      - report: "Compound Reports"
        type: added
        description: "Phase 1 foundations for multi-recipe compound bundles (e.g. a monthly Executive Summary + CRA Compliance + Triage Prioritization bundle): design tokens (Python Ōåö CSS single source of truth with parity tests + drift check script), server-side chart SVG primitives (8 chart types incl. doughnut + radar), and fragment-mode HTML rendering with CSS scoping under `.fs-section-<slug>`. Chart-in-PDF wiring deferred to a follow-on project."
      - report: "Executive Dashboard"
        type: fixed
        description: "CSV output was being written as a single newline (24 bytes) on portfolio-wide, warm-cache, and `--folder` runs because the CSV branch rendered `report_data.data` (empty for this recipe) while XLSX correctly read per-project rows from `additional_data[\"transform_result\"][\"project_table\"]`. Both renderers now share a single helper so they can't drift apart again. Caught by an fs-qabot full-run pass."
      - report: "Executive Dashboard"
        type: added
        description: "Secondary `Executive Dashboard_Top_Risk_Products.csv` is now emitted alongside the main CSV, carrying the ranked top-risk list with risk scores. Pairs with the existing Top Risk Products XLSX sheet so CSV consumers have the same surface area as XLSX consumers."
      - report: "CVE Component Evidence"
        type: added
        description: "New recipe (on-demand). Per-version triage: lists every CVE-bearing component in a project version with its CVE IDs and the file paths inside the firmware where the component was detected. Requires `--project` + `--version` (no `--cve` narrowing ŌĆö recipe always covers the full set of CVE-bearing components for the version). Uses an internal evidence endpoint; `--cache-ttl` recommended for re-runs and `FS_REPORT_EVIDENCE_WORKERS` is an escape hatch if the endpoint returns errors. Output formats: HTML + CSV. README updated with a row in the Available Reports table and a CLI usage example block."
      - report: "Docs"
        type: added
        description: "7 new platform asks added to `docs/api/API_wishlist.md` (#14ŌĆō#20): CISA KEV catalog fields server-side, `inKev`/`inVcKev` and `exploitInfo` token deltas on `/cves/updates`, event timestamps on update records, `triageStartedAt` on findings, `fields=` response projection, and RSQL filtering on `exploitInfo` tokens. These would let fs-report stop fetching cisa.gov directly, narrow snapshot-diff to platform-side detection, and remove the wide-fetch default in CRA Compliance."
      - report: "Scan Analysis"
        type: fixed
        description: "Failed-scan error column was empty on the helix v2 backend because the `/scans` endpoint renames the alloy `errorMessage` field to `bssMessage`. fs-report now normalizes both names to `errorMessage` at the cache boundary and the transform layer, so the column populates regardless of backend. Alloy `errorMessage` wins when both happen to be present."
      - report: "HTML Reports"
        type: fixed
        description: "Unified brand chrome across every human-audience HTML report. Three fixes wrapped into one round of cleanup: (1) the embedded Finite State logo fallback in `base.html` had invalid base64 padding so it rendered as a broken-image icon ŌĆö replaced with the canonical valid blob, now shared via a new `_default_logo.html` partial; (2) the 6 recipes that extend `base.html` (Executive Summary, Assessment Overview, User Activity, Findings by Project, False Positive Analysis, Workflow Summary) were silently dropping Chart.js, so any chart canvases stayed blank ŌĆö Chart.js is now loaded via a `chart_libs` block that fires before the design-token defaults setup, and chart-less recipes skip the ~80 kB fetch; (3) `base.html`'s `.container` `max-width: 1024px` was making wide data tables (Findings by Project, etc.) feel cramped ŌĆö removed to match the standalone-template recipes that fill the viewport. Also: footer copy and copyright are now sourced from a single `_default_footer.html` partial across all 17 standalone templates plus the base-extending ones, with the copyright year derived from `generated_at` so reports generated in future years won't show a stale year."
      - report: "Findings by Project"
        type: added
        description: "New `Exploit Maturity` column ŌĆö a single tier string (`poc` / `weaponized` / empty) read straight from the API, mirroring the platform GUI's `columns.exploitMaturity`. Lets you filter findings by exploit maturity tier directly from the script-generated CSV/XLSX instead of having to use the GUI export."
      - report: "Findings by Project"
        type: changed
        description: "Two exploit columns renamed to reflect what they actually contain. `# of known exploits` ŌåÆ `# exploit signal categories`: it counts the distinct exploit-signal categories present in `exploitInfo` (maturity tiers, availability, KEV, in-the-wild flags), not a per-source exploit count ŌĆö so it caps around 7ŌĆō9 and does NOT equal the platform UI's \"Exploits\" tally. `# of known weaponization` ŌåÆ `# in-the-wild exploitation signals`: it counts botnet / ransomware / threat-actor reports, NOT the weaponized maturity tier (a CVE can be `weaponized` with zero in-the-wild signals). If you key automation off the old CSV/XLSX headers, switch to the new names."
      - report: "Findings by Project"
        type: added
        description: "Self-documenting output ŌĆö every column is now described in-place so you don't have to read source to understand the report. XLSX gains a `Schema` sheet, HTML and Markdown gain a collapsible `Column reference` section, and CSV/JSON consumers get a machine-readable `Findings by Project_schema.json` sidecar next to the data file. All four surfaces are sourced from a single `output.columns` block in the recipe. Prompted by a customer field question about reconciling the GUI CSV export against the script-generated report."
      - report: "Scan Quality"
        type: fixed
        description: "`unpacking_score = -1` now renders as `Not Applicable` across tables, the rating-distribution chart, and exports, instead of a bare em-dash. This clearly distinguishes \"unpacking does not apply to this artifact type\" from missing or failed scan data."
  - version: "1.9.8"
    date: "2026-05-05"
    changes:
      - report: "License Report"
        type: fixed
        description: "License extraction now reads `concludedLicenses` (the user-curated license that takes precedence over auto-detected `declaredLicenses`, per the field comments in `sqlite_cache.py`) and falls back to the structured `concludedLicenseDetails` / `declaredLicenseDetails` / `licenseDetails` arrays ŌĆö mirroring the precedence already used by Component List and Customer Brief. Previously, components whose license was set only as a concluded license were classified as `Unknown` and dropped by `--license=\"...\"`, so a portfolio-wide `--license=\"Sleepycat\"` could surface a single project even when dozens carried the license. List-of-strings and list-of-dicts shapes (e.g. `[{\"spdx\": \"Sleepycat\"}]`, `[{\"name\": \"Sleepycat\"}]`) are now coerced to a proper SPDX string instead of leaking a Python repr into the License column."
      - report: "License Report"
        type: fixed
        description: "Risk category now reads `copyleftFamily` directly from the API's `*LicenseDetails` arrays (concluded > declared > generic), so classification matches the platform UI exactly. Previously the report relied solely on the in-repo `COPYLEFT_LOOKUP` SPDX table ŌĆö Sleepycat (and any other licenses absent from that table) was silently classified as `Unknown` even though the platform marked it `Strong Copyleft`. The lookup table is still consulted as a fallback when a component's record has no `licenseDetails`, and `Sleepycat` has been added to it as belt-and-suspenders. The `copyleftFamily` enum mapping covers `COPYLEFT_STRONG`, `COPYLEFT_WEAK`, and `PERMISSIVE` (the API uses a bare `PERMISSIVE` with no prefix)."
      - report: "Web UI"
        type: fixed
        description: "`WebAppState.save()` no longer drops resets back to default on the floor (#48). Previously, keys whose value matched `DEFAULTS` were skipped during serialization and then merged on top of the existing on-disk config, so resetting a previously-customised setting (e.g. selecting `(default Finite State logo)`, or toggling a boolean back off) silently left the stale non-default value behind. Default-valued keys are now explicitly dropped from the merged dict before write so resets stick. Regression covered by new tests in `tests/test_web_state.py` for both string and boolean defaults."
      - report: "Docs"
        type: added
        description: "README install instructions now include a Windows PowerShell `irm | iex` one-liner alongside the existing bash one-liner, plus local-clone usage of `setup.ps1 -FromSource`, current-session and persistent (`[Environment]::SetEnvironmentVariable`) env-var setup, and the `Set-ExecutionPolicy -Scope Process` workaround for execution-policy errors (#50)."
  - version: "1.9.7"
    date: "2026-04-29"
    changes:
      - report: "License Report"
        type: added
        description: "Per-component detail table. The recipe now emits `License Report_Detail.csv` (one row per component: License, Risk Category, Project, Component, Version) alongside the existing per-license summary. XLSX is now a two-sheet workbook (`Summary` + `Detail`) and HTML renders both tables on one page. Replaces the prior approach of cramming a comma-separated component list into a single summary cell, which hit Excel's 32,767-char-per-cell limit on long-tail licenses (e.g. Apache-2.0 across thousands of components)."
      - report: "License Report"
        type: added
        description: "`--license \"GPL,AGPL\"` flag. Comma-separated, case-insensitive substring match against the declared license name. Filters the summary, detail, pie chart, and KPIs. Use to narrow the report to violation licenses (e.g. strong copyleft) and list every project + component carrying them. Filtering is client-side; the full component list is still fetched from `/public/v0/components`."
      - report: "False Positive Analysis"
        type: added
        description: "Component-identity pipeline + narrativeŌåÆVEX propagation (#46). FPA now fronts an identity-first verdict (`not_affected` / `affected` / `ambiguous`) ahead of the residual-candidate list, with a per-CVE applicability fan-out for ambiguous components. Triage Prioritization picks up the structured component verdicts at both `--ai-depth=summary` and `--ai-depth=full` so the VEX override loop can flip `IN_TRIAGE` ŌåÆ `NOT_AFFECTED` consistently. A summary-depth banner makes it explicit that per-finding narrative is non-authoritative when AI runs in summary mode. Adds a hedge-word guard to the TP narrative fallback matcher so phrases like 'most versions' don't trigger blanket `NOT_AFFECTED`."
      - report: "False Positive Analysis"
        type: fixed
        description: "Components with thousands of attributed CVEs (e.g. Linux kernel) blew past the LLM context window, the exception was swallowed, and the entire AI tier silently produced `ai_detections=0` / `identity_assertions=[]`. The identity prompt's NVD snippet is now scoped to the same 15-CVE sample shown in the prompt, the per-CVE applicability fan-out is chunked into batches of 50, and each component is wrapped in its own `try`/`except` so one bad component no longer aborts the whole tier."
      - report: "False Positive Analysis"
        type: changed
        description: "Cross-project propagation signal downgraded from HIGH to MEDIUM. The same CVE+component pair can legitimately be FP in one project and exploitable in another, so cross-project hits are a hint that needs corroboration before producing a VEX recommendation (which is gated to HIGH confidence)."
      - report: "False Positive Analysis"
        type: removed
        description: "Finding-level fallback removed. FPA was carved out of Triage Prioritization to be the focused FP-detection action, but the AI tier was re-running the full triage prompt on top-200 findings for confirmed/ambiguous components and discarding everything except the APPLICABILITY field. Per-finding triage belongs in TP, not here."
      - report: "False Positive Analysis"
        type: removed
        description: "Historical-pattern signal removed. The `historical_component_pattern` signal extrapolated from ~10 prior triaged findings to thousands of new ones with no lookback window ŌĆö pulling it out to rethink the design rather than ship a flaky over-generalisation."
      - report: "False Positive Analysis"
        type: fixed
        description: "VEX recommendations are now gated on HIGH confidence only. `_build_vex_recommendation` previously hardcoded `recommended_vex_status=NOT_AFFECTED` regardless of the rolled-up confidence, so MEDIUM/LOW candidates flagged as 'Review' in the CSV were simultaneously written as `NOT_AFFECTED` in `vex_recommendations.json` and any autotriage consumer would auto-apply them. MEDIUM/LOW now still surface in the report as review notes but produce no VEX artifact."
      - report: "Triage Prioritization"
        type: fixed
        description: "AI guidance tables now render markdown (Rationale / Guidance / Workaround / Action cells) via the existing `marked.parse` + DOMPurify pipeline. Bold, inline code, and headings in LLM prose previously displayed as literal `**` and backticks. The structured-response parser also tolerates markdown-bolded field prefixes (e.g. `**FIX_VERSION:**`) ŌĆö the LLM's multi-CVE markdown output was triggering the fallback that dumps the raw response into the guidance column. The component prompt now includes an explicit output contract forbidding per-CVE sections, bolded labels, or repeated labels."

  - version: "1.9.6"
    date: "2026-04-21"
    changes:
      - report: "Executive Dashboard"
        type: fixed
        description: "Summary-mode SCA KPIs (Components, Total Findings, Policy Violations, Policy Warnings) now derive from live per-version data rather than cached `/projects` rollups. On warm-cache runs the rollup counts are stripped by the structured cache, which previously surfaced as `Components: 0 / Total Findings: 0` on the dashboard (#36)."
      - report: "Executive Dashboard"
        type: fixed
        description: "Summary-mode Finding Age Distribution chart now populates correctly on warm-cache runs. Same cache-stripping issue affected the finding count lookup, causing every project to fall into the `continue` branch and all five age buckets to render empty (#38)."
      - report: "Executive Dashboard"
        type: changed
        description: "Summary-mode Severity Trends title now shows the actual period window (e.g. `Severity Trends (2026-03-21 to 2026-04-20)`) instead of a derived calendar-month count. A 30-day window crossing a month boundary was producing the misleading label `Severity Trends (2 Months)` (#38)."
      - report: "Executive Dashboard"
        type: added
        description: "Summary-mode now honors `--period` / `--start` / `--end` for the portfolio scope. When the user explicitly requests a period, projects whose current version was scanned outside the window are dropped from the KPIs and charts. Default runs (no explicit period) continue to aggregate all projects (#36)."
      - report: "Executive Dashboard"
        type: changed
        description: "Summary-mode batched `/components` and `/versions` fetches for a 10-50x reduction in round-trip count on large portfolios. Each batch logs a progress line at INFO so long fetch phases aren't silent (#32, #35)."
      - report: "Executive Dashboard"
        type: changed
        description: "Warm-cache reruns now skip `/components` and `/versions` entirely when every requested id is already cached per-PV, rather than re-issuing the batched fetch under a different cache key (#33)."
      - report: "Security Progress"
        type: fixed
        description: "Recipe was issuing `sort=detectedDate:asc` which the `/findings` API rejects with HTTP 400, causing every Security Progress run to return no data. Fixed to `detected:asc` (#39)."
      - report: "Component Remediation Package"
        type: fixed
        description: "HTML renderer no longer crashes with `'summary' is undefined` when the component search returns zero matching versions. The template now defaults missing keys so empty-result runs produce a valid page (#39)."
      - report: "Component List"
        type: fixed
        description: "`--folder <empty-folder>` no longer silently processes the entire portfolio. The empty-set case was falling through a falsy-check and triggering a full-portfolio scan (155 projects / 10+ minutes). Now short-circuits to an empty report in seconds (#40)."
      - report: "License Report"
        type: fixed
        description: "Same empty-folder short-circuit as Component List ŌĆö the two recipes share the same fetch path (#40)."
      - component: "SQLite cache"
        type: fixed
        description: "Projects table now preserves `defaultBranch.latestVersion.created` across cache round-trips. Without it, the Executive Dashboard period filter dropped every project on warm-cache runs because every `latestVersion.created` came back None (#37)."
      - cli: "--scoring-file"
        type: fixed
        description: "Missing / unreadable / malformed / empty / non-dict scoring-file YAML now fails fast with a red error at CLI startup. Previously these all fell through to default scoring weights with only a DEBUG log, leaving users unaware their custom profile wasn't being applied (#34)."
      - cli: "--ai-export"
        type: fixed
        description: "`--ai-export <file>` without `--ai-prompts` no longer silently does nothing. The export block lives inside the `--ai-prompts` code path; the CLI now implies `--ai-prompts=True` when `--ai-export` is set so the airgap workflow works as documented (#34)."
      - component: "AI cache"
        type: fixed
        description: "`cve_remediations` + summary caches now include the provider+model in their keys, so swapping `--ai-model-high` or `--ai-model-low` forces a fresh LLM call instead of returning another model's cached answer. Four recipes (Remediation Package, Component Remediation Package, False Positive Analysis, Triage Prioritization) also now correctly pass `--ai-provider` / `--ai-model-high` / `--ai-model-low` through to `LLMClient` (#34)."
      - report: "Version Comparison"
        type: fixed
        description: "`--folder` + `--project` now narrows to the named project within the folder instead of scanning every project in the folder (#26)."
      - report: "Version Comparison"
        type: fixed
        description: "`--baseline-version` / `--current-version` now accept version names (resolved against the scoped project) in addition to IDs. Names previously produced blank reports because the RSQL filter matched nothing (#26)."
      - report: "Version Comparison"
        type: added
        description: "`--period` now trims single-project runs to versions created in the window, plus the most recent pre-window version as implicit baseline ('what entered the period'). Folder-wide, portfolio-wide, and explicit-pair modes still ignore `--period` (#27)."
      - report: "Version Comparison"
        type: added
        description: "Per-version fetch failures no longer abort the run. Failed versions appear as placeholders ('fetch failed') in the progression; KPIs exclude them; a banner names the failed versions. HTML/CSV/XLSX/Markdown all surface the signal (#27)."
      - report: "Version Comparison"
        type: fixed
        description: "`_Progression.xlsx` no longer crashes on nested-dict columns (findings_in_version, component_churn, etc.). Nested data remains available in the sibling `_Progression.csv` (#28)."
      - report: "Executive Dashboard"
        type: changed
        description: "Greatly improved performance. Use `--detailed` to opt into the legacy per-finding pipeline."
      - report: "Executive Dashboard"
        type: changed
        description: "Severity Trends in summary mode plots a single 'Total Findings' line (month-end inventory from version history). Per-severity Critical/High lines require --detailed."
      - report: "Executive Dashboard"
        type: changed
        description: "Finding Age in summary mode buckets findings by the age of the version they live in, not by per-finding detection date. Use --detailed for the original semantic."
      - report: "Executive Dashboard"
        type: changed
        description: "Open Issues panel renamed to 'Findings by Triage Status' in summary mode; shows all 7 VEX statuses (No Status, Not Affected, False Positive, In Triage, Resolved, Resolved w/ Pedigree, Exploitable). Detailed mode keeps the original 'Open Issues by Severity' title."
      - report: "Executive Dashboard"
        type: improved
        description: "Exploit Intelligence expanded from 2 bars (KEV, Known Exploits) to 9 categories (kev, vckev, poc, weaponized, ransomware, botnets, threatactors, commercial, reported)."
      - report: "Executive Dashboard"
        type: added
        description: "Policy Health panel: horizontal stacked bar chart showing Security Policy (component-level violations/warnings covering finding severity/exploit + Age/EOL/NTIA) and License Policy (from licenseDetails classifications) side by side. Surfaces the violation/warning ratio that the SCA Summary KPIs alone don't explain."
      - report: "Executive Dashboard"
        type: changed
        description: "`findings_by_group` dataset split into separate `findings_by_folder` and `findings_by_project` streams so both breakdowns can be rendered independently."
      - report: "Component Impact"
        type: fixed
        description: "`--component-match exact` is now honored end-to-end. Previously, when the component search returned zero exact matches, the engine fell through to the portfolio-wide fetch and the transform's default contains filter re-included substring matches (e.g. `--component ssl --component-match exact` silently reported findings for openssl/libssl). Engine now short-circuits to an empty report, and the transform respects the match mode."
      - report: "Customer Brief"
        type: fixed
        description: "HTML output no longer hugs the browser edge, and 9-column findings tables no longer overflow the PDF right margin. Added a screen-only container max-width/padding and cell-level wrap for long unbreakable strings (purls, versions, CVE IDs)."
      - report: "Customer Brief"
        type: fixed
        description: "Severity breakdown now reconciles with Total Open. Findings whose severity is not one of the five CVSS classifications (SAST/config findings, CVEs missing CVSS scoring) now appear in a new 'Other' bucket on both the KPI row and the severity pie chart instead of silently disappearing."
      - report: "Customer Brief"
        type: improved
        description: "Component Licenses chart now uses the same project-version filter as the 'N Components' KPI, and renders an inline footnote with the count of components missing license metadata so the two numbers reconcile."
      - report: ~
        type: added
        description: "per_project_parallel reusable helper for API-bound per-project work units (ThreadPoolExecutor, captures per-project exceptions)."
      - report: ~
        type: added
        description: "summary_counts API wrappers + SQLite-cached fetch_all_summary_counts convenience."
      - report: ~
        type: added
        description: "fetch_data path now retries 429/500/502/503/504 with exponential backoff (3 attempts)."
      - report: ~
        type: fixed
        description: "SQLite cache layer now thread-safe (added global lock) for concurrent access from ThreadPoolExecutor workers."
      - report: ~
        type: fixed
        description: "LLM client no longer leaks SQLite file descriptors across batch AI-guidance runs. The prior `with sqlite3.connect(...) as conn:` pattern only commits ŌĆö connections were reclaimed by cyclic GC, which on macOS (ulimit -n 256) exhausted FDs mid-batch and surfaced as `OSError: [Errno 24] Too many open files` during the next pandas lazy import. All cache operations now go through a context manager that explicitly closes."


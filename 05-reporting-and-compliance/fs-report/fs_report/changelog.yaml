releases:
  - version: "1.9.3"
    date: "2026-04-02"
    changes:
      - report: "Configuration Analysis Triage"
        type: added
        description: "New recipe triaging CREDENTIALS, CONFIG_ISSUES, and CRYPTO_MATERIAL findings with tiered-gates scoring. Parses additionalDetails to distinguish private keys from public keys/certs. Gate 1: Private keys → CRITICAL. Gate 2: High-severity credentials → HIGH. Gate 3: High-severity config issues → MEDIUM."
      - report: "Configuration Analysis Triage"
        type: added
        description: "VEX recommendations: public keys/certs → NOT_AFFECTED, gate matches → IN_TRIAGE. Supports --autotriage and --autotriage-status."
      - report: "Configuration Analysis Triage"
        type: added
        description: "Dedicated HTML template with category badges, gate funnel chart, band distribution, and findings detail table"
      - report: ~
        type: added
        description: "includeAdditionalDetails API parameter support in QueryParams — recipes can request extended finding details (description, remediation, mitigation)"
      - report: ~
        type: added
        description: "Recipe default_finding_types parameter — recipes can declare their own default finding type filter, overriding the CLI default"
      - report: ~
        type: fixed
        description: "_fetch_with_version_batching now forwards include_additional_details from base query to per-batch queries"
      - report: ~
        type: fixed
        description: "--top=0 (CLI default) no longer truncates output to zero rows"


releases:
  - version: "1.8.0"
    date: "2026-03-06"
    changes:
      - report: "License Report"
        type: added
        description: "New recipe classifying component licenses into risk categories (Permissive, Weak Copyleft, Strong Copyleft, Proprietary/Restricted, Unknown) with HTML, CSV, and XLSX output"
      - report: "Triage Prioritization"
        type: added
        description: "Airgapped AI workflow — --ai-export exports prompts to JSON, --ai-import ingests responses, no API key required"
      - report: "Triage Prioritization"
        type: added
        description: "--top N flag limits output to the top N findings by score (CLI and web UI)"
      - report: "Triage Prioritization"
        type: added
        description: "--triage N flag limits VEX recommendation generation to top N findings while showing full list (CLI and web UI)"
      - report: "Triage Prioritization"
        type: added
        description: "--tp-gate flag filters findings to a specific gate tier (GATE_1, GATE_2, or NONE)"
      - report: "Triage Prioritization"
        type: improved
        description: "Score breakdown tooltip on hover shows Reachability, Exploit/KEV, Attack Vector, EPSS, CVSS, and Gate Bonus factors"
      - report: "Triage Prioritization"
        type: improved
        description: "Gate scores are now additive bonuses on top of computed score, allowing differentiation among findings within the same gate"
      - report: "Triage Prioritization"
        type: improved
        description: "Tables with more than 10 rows are collapsed by default with a Show more button"
      - report: "Triage Prioritization"
        type: fixed
        description: "VEX justification uses CODE_NOT_PRESENT (API enum) instead of COMPONENT_NOT_PRESENT (CycloneDX enum)"
      - report: "Findings by Project"
        type: added
        description: "KEV column showing Known Exploited Vulnerability indicator in all output formats including HTML"
      - report: "Executive Dashboard"
        type: added
        description: "CSV and XLSX export formats with aggregated project summary table"
      - report: "Executive Dashboard"
        type: added
        description: "KEV indicators in Top Risk Products and Project Findings Summary tables"
      - report: "Executive Dashboard"
        type: improved
        description: "Project Summary table moved to bottom of report; auto-logarithmic scale on Findings by Group chart"
      - report: "Executive Dashboard"
        type: improved
        description: "Configurable project grouping via max_projects recipe parameter (0 = show all, no binning)"
      - report: "Executive Dashboard"
        type: improved
        description: "License distribution chart shows all licenses instead of top 10"
      - report: "Executive Summary"
        type: improved
        description: "Severity counts shown as pivoted columns (Critical, High, Medium, Low, Total) per project"
      - report: "Component List"
        type: added
        description: "HTML output format with KPI cards, charts, and tabular view"
      - report: "Version Comparison"
        type: improved
        description: "Project column always shown regardless of comparison mode"
      - report: ~
        type: added
        description: "Deployment Context UI in web pre-run form and settings page (product type, network exposure, regulatory, deployment notes)"
      - report: ~
        type: improved
        description: "Cache TTL input in web UI accepts duration strings (4h, 2d, 30m) matching CLI behavior"
      - report: ~
        type: improved
        description: "GHSA and PYSEC findings link to github.com/advisories instead of NVD"
      - report: ~
        type: improved
        description: "XLSX formula injection protection via disabled strings_to_formulas"
      - report: ~
        type: fixed
        description: "Serve UI no longer crashes with Content-Length mismatch when reports are regenerated"
      - report: ~
        type: fixed
        description: "SQLite cache tables auto-created on first access, preventing no such table errors"
      - report: ~
        type: fixed
        description: "Batch API request sizes reduced to avoid HTTP 414 URL-too-long on large folders"

  - version: "1.7.1"
    date: "2026-03-03"
    changes:
      - report: "Executive Dashboard"
        type: fixed
        description: "Policy violation and warning KPI counts restored — licenseDetails arrays preserved through SQLite cache"
      - report: ~
        type: fixed
        description: "Batch fetch HTTP 400 on large portfolios — reduced project batch sizes to keep URLs under server limits"
      - report: ~
        type: fixed
        description: "Suppressed noisy 404 warnings for findings without exploit data"
      - report: "Executive Dashboard"
        type: changed
        description: "Warnings label renamed to Policy Warnings for clarity"

  - version: "1.7.0"
    date: "2026-03-01"
    changes:
      - report: ~
        type: added
        description: "Deployment context (--product-type, --network-exposure, --context-file) tailors AI prompts to product type and network environment"
      - report: "Triage Prioritization"
        type: improved
        description: "AI prompts use product-specific persona and workaround templates when deployment context is provided"
      - report: "CVE Impact"
        type: improved
        description: "AI prompts use product-specific persona and workaround templates when deployment context is provided"
      - report: "Remediation Package"
        type: improved
        description: "AI prompts use product-specific persona and workaround templates when deployment context is provided"
      - report: "Executive Dashboard"
        type: improved
        description: "Additional metrics and visualizations"
      - report: "Findings by Project"
        type: improved
        description: "Richer finding detail columns in HTML table"
      - report: ~
        type: added
        description: "Scanner accuracy analysis script (scripts/analysis/scanner_accuracy.py)"
      - report: "Remediation Package"
        type: improved
        description: "Bold subject CVE and expand arrow indicators on clickable CVE detail badges"
      - report: ~
        type: improved
        description: "Docker base image upgraded to Python 3.13; Pillow >=11.1.0 lower-bound pin"
      - report: ~
        type: fixed
        description: "Web UI SSE log events use json.dumps() instead of hand-rolled escaping — fixes malformed JSON on tab/control characters"
      - report: ~
        type: fixed
        description: "Web UI stderr redirect is now thread-safe across concurrent report runs"
      - report: "Triage Prioritization"
        type: fixed
        description: "Markdown renderer findings table column alignment corrected"

  - version: "1.6.0"
    date: "2026-02-25"
    changes:
      - report: "Remediation Package"
        type: added
        description: "OSV fix-version validation ensures proposed upgrades aren't themselves vulnerable"
      - report: "Remediation Package"
        type: added
        description: "Structured remediation options (upgrade / workaround / code_mitigation) per action"
      - report: "Remediation Package"
        type: added
        description: "NVD workaround/mitigation URL extraction and LLM enrichment fields"
      - report: "Remediation Package"
        type: changed
        description: "Charts removed in favour of concentrated data output; summary shows Components instead of Actions"
      - report: ~
        type: added
        description: "Markdown output format (agent-optimised, token-efficient) enabled on CVA, CVE Impact, Findings by Project, Triage, and Version Comparison"
      - report: ~
        type: added
        description: "Web UI: Remediation Package, CVA, and Export Components workflow cards; zip download; log viewer; new folder; per-recipe progress bar"
      - report: ~
        type: added
        description: "--ai off master switch disables all AI enrichment regardless of recipe defaults"
      - report: ~
        type: added
        description: "XLSX renderer skips export with warning when rows exceed Excel 65K URL limit"
      - report: ~
        type: fixed
        description: "Theme toggle (dark/light) now works — app.js was not loaded in base.html"
      - report: ~
        type: fixed
        description: "18 pre-existing mypy type errors fixed in report_engine.py and settings.py"

  - version: "1.5.4"
    date: "2026-02-21"
    changes:
      - report: "CVE Impact"
        type: fixed
        description: "Version filter now uses authoritative defaultBranch.latestVersion.id instead of unreliable max(version_id) heuristic"
      - report: "CVE Impact"
        type: fixed
        description: "Version ID type coercion prevents filter failures when SQLite cache returns string values"
      - report: "CVE Impact"
        type: fixed
        description: "Per-CVE fallback keeps findings unfiltered rather than showing all UNKNOWN when authoritative data is incomplete"


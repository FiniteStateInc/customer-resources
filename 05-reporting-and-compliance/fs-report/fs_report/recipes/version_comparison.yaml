name: "Version Comparison"
category: assessment
template: "version_comparison.html"
description: "Full version and component changelog: progression across versions with fixed/new findings and component churn per version pair. Scope with --project, --folder, or both (--project narrows to that project within --folder). Use --period to trim single-project runs to a [predecessor + in-window] slice (ignored for folder/portfolio and explicit-pair modes). Use --baseline-version and --current-version (ID or name) to limit to a single pair. Use --version-sort (created|name) and --version-sort-desc to control ordering. Per-version fetch failures are logged and reported as unavailable rather than aborting the run."
execution_order: 50
auto_run: false

# Data is fetched by the report engine via scan discovery.
# The primary query is a placeholder; the engine overrides it.
query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000

transform_function: version_comparison_transform

output:
  formats: ["csv", "xlsx", "html", "md"]
  table: true
  slide_title: "Version Comparison"
  charts:
    - name: "external_changes"
      chart: bar
      title: "External CVE Changes This Window"
      description: "CVEs present in both versions whose severity or exploit status changed due to platform intelligence updates (not developer action)"

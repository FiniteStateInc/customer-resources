name: "CVE Component Evidence"
category: assessment
nav_category: Investigation
description: "For a project version, lists CVE-bearing components with their associated CVE IDs and the firmware file paths where the component was detected. Components with no CVEs are excluded (no triage needed). Uses the affected==<componentId> findings filter (same join the platform UI uses). Requires --version <project_version_id>."
execution_order: 31
auto_run: false
requires_project: true

query:
  endpoint: "/public/v0/components"
  params:
    limit: 10000

transform_function: cve_component_evidence_pandas_transform
template: "cve_component_evidence.html"

output:
  table: true
  charts: []
  formats: ["csv", "html"]

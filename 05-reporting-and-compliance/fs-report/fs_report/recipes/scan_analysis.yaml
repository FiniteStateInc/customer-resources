name: "Scan Analysis"
category: operational  # Period-bound: shows scan activity within the specified time window
nav_category: Investigation
chart_libraries: ["echarts"]
description: "Analyze scan throughput, durations, failures, and queue status"
template: "scan_analysis.html"
execution_order: 10  # Runs first - fetches scans that other reports reuse

query:
  endpoint: "/public/v0/scans"
  params:
    sort: "created:asc"
    limit: 100

project_list_query:
  endpoint: "/public/v0/projects"
  params:
    limit: 10000
    archived: false

transform_function: scan_analysis_transform

output:
  formats: ["csv", "xlsx", "html"]
  # Phase 1b Batch B.2 round-2: all 5 chart panels are rendered inline by the
  # template's ECharts code (standalone mode) or as chart-unavailable
  # placeholders (fragment mode). The YAML chart specs were dropped because
  # the live template's chart semantics no longer match a static
  # "pie/bar/line" spec (e.g. the failure_types panel renders as a dual-axis
  # stacked-bar + line "Scan failures over time", not a pie). Mirrors the
  # component_list recipe's `charts: []` pattern — no server-SVG dispatch.
  charts: []
  has_inline_charts: true

  table: true
  slide_title: "Scan Operations Analysis"
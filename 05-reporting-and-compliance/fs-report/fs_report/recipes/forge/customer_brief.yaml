name: "Customer Brief"
category: assessment
nav_category: Executive
description: "External-facing project security brief for customers and regulators."
execution_order: 20
auto_run: false
requires_project: true

parameters:
  mode: summary
  all_severities: false
  max_detailed_findings: 100

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000

additional_queries:
  components:
    endpoint: "/public/v0/components"
    params:
      limit: 10000

transform_function: customer_brief_transform

template: customer_brief.html

output:
  table: true
  formats:
    - html
    - md
    - pdf
  charts: []

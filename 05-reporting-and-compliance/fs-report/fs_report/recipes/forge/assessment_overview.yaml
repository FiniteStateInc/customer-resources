name: "Assessment Overview"
category: assessment
description: "Internal management snapshot for a project or folder."
execution_order: 25
auto_run: false
requires_project_or_folder: true

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000

additional_queries:
  components:
    endpoint: "/public/v0/components"
    params:
      limit: 10000

transform_function: assessment_overview_transform

template: assessment_overview.html

output:
  table: true
  formats:
    - html
    - md
  charts: []

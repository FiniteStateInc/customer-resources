name: "Findings by Project"
category: assessment  # Current state: shows today's findings inventory regardless of time period
nav_category: Investigation
template: "findings_by_project.html"
description: "Comprehensive inventory of findings across projects with optional filtering"
execution_order: 20  # Reuses cached scans from Scan Analysis
auto_run: false  # Run explicitly with --recipe when needed

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000
    filter: ""

# Project list query for discovery
project_list_query:
  endpoint: "/public/v0/projects"
  params:
    limit: 10000
    archived: false

transform_function: findings_by_project_pandas_transform
output:
  table: true
  formats:
    - csv
    - xlsx
    - html
    - json
    - md
  charts: []
  # Per-column documentation. Renderers (xlsx Schema sheet, HTML/MD banner)
  # source descriptions from here so customers can read what each column
  # means without opening fs-report source code. Adding a new output column
  # should add an entry here in the same PR.
  columns:
    - name: "CVE ID"
      source: "API /findings: cve_id"
      description: "The CVE identifier (e.g. CVE-2024-12345)."
    - name: "Severity"
      source: "API /findings: severity"
      description: "Platform severity tier (critical / high / medium / low / info)."
    - name: "CVSS"
      source: "API /findings: risk (rescaled 0–100 → 0–10)"
      description: "CVSS v3 base score on the standard 0.0–10.0 scale."
    - name: "KEV"
      source: "API /findings: inKev (boolean)"
      description: "\"Yes\" if listed in CISA's Known Exploited Vulnerabilities catalog."
    - name: "Project Name"
      source: "API /findings: project.name"
      description: "Display name of the Finite State project the finding belongs to."
    - name: "Project Version"
      source: "API /findings: projectVersion.version"
      description: "Version label for that project."
    - name: "Folder"
      source: "API /folders: name (joined via project.folderId)"
      description: "Folder the project lives in, or empty for projects at the root."
    - name: "Component Group"
      source: "Derived from component.purl namespace"
      description: "Group / namespace portion of the component PURL (e.g. \"@scope\" for npm)."
    - name: "Component"
      source: "API /findings: component.name"
      description: "Component the CVE was identified against."
    - name: "Component Version"
      source: "API /findings: component.version"
      description: "Version of that component as detected by the scan."
    - name: "Status"
      source: "API /findings: status"
      description: "Triage status (AFFECTED / NOT_AFFECTED / IN_TRIAGE / FALSE_POSITIVE / RESOLVED / RESOLVED_WITH_PEDIGREE)."
    - name: "Reachability"
      source: "API /findings: reachabilityScore"
      description: "REACHABLE / UNREACHABLE / INCONCLUSIVE / UNKNOWN, derived from the platform's reachability analysis (binary scans only)."
    - name: "Detected"
      source: "API /findings: detected"
      description: "ISO-8601 timestamp when the platform first detected this finding."
    - name: "Exploit Maturity"
      source: "API /findings: exploitMaturity"
      description: "Single maturity tier string for this CVE: \"poc\" (proof exists) or \"weaponized\" (working, often productized exploit). Empty if no exploit reference is known. Matches the platform GUI's columns.exploitMaturity export."
    - name: "# exploit signal categories"
      source: "API /findings: len(exploitInfo)"
      description: "Count of distinct exploit-related signal *categories* the platform has observed for this CVE — drawn from VulnCheck maturity tiers, availability flags, KEV listings, and in-the-wild exploitation reports. This is NOT a per-source exploit-reference count; it tops out around 7–9 even for the most-exploited CVEs. The accurate per-source count (matching the platform UI's \"Exploits\" tab) requires per-CVE enrichment and is tracked as a follow-up."
    - name: "# in-the-wild exploitation signals"
      source: "API /findings: count of exploitInfo tokens matching botnet/ransomware/threat/actor"
      description: "Number of in-the-wild exploitation signals on this CVE — incremented per matching token (named-adversary, ransomware family, or botnet exploitation report). Does NOT count the weaponized maturity tier; see Exploit Maturity for that. A CVE with Exploit Maturity = weaponized can have this value = 0 if no named adversary is yet attributed."
    - name: "CWE"
      source: "API /findings: cwes[0]"
      description: "Primary CWE identifier (e.g. CWE-79)."
    - name: "Description"
      source: "Joined NVD enrichment"
      description: "CVE description from NVD when enrichment is available, otherwise empty."
    - name: "CVSS v2 Vector"
      source: "Joined NVD enrichment"
      description: "CVSS v2 vector string when available."
    - name: "CVSS v3 Vector"
      source: "Joined NVD enrichment"
      description: "CVSS v3 vector string when available."
    - name: "NVD URL"
      source: "Constructed from CVE ID"
      description: "Direct link to the CVE on https://nvd.nist.gov."
    - name: "FS Link"
      source: "Constructed from project / version / finding IDs"
      description: "Deep link to the finding in the Finite State platform UI."
    - name: "dependency_path"
      source: "Computed from project dependency expansion (conditional column)"
      description: "Project dependency chain (e.g. \"ProjectA -> ProjectB\"). Only present when the target project has cross-project dependency expansion enabled; absent otherwise."
    - name: "component_dependency_path"
      source: "Computed from project + component dependency expansion (conditional column)"
      description: "Full path including the component (e.g. \"ProjectA -> ProjectB -> openssl 1.1.1\"). Only present when the target project has cross-project dependency expansion enabled; absent otherwise."
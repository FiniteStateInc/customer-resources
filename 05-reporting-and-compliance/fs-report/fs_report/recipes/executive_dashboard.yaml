name: "Executive Dashboard"
category: assessment  # Current state: shows today's security posture regardless of time period
card_description: "Single-page security posture overview for leadership."
nav_category: Executive
chart_libraries: ["echarts"]
template: "executive_dashboard.html"
description: >
  Executive-level security dashboard for senior leadership.
  Single-page overview with 13 visualization sections covering findings
  distribution, severity trends, risk scoring, license analysis,
  exploit intelligence, policy health, and finding age.
  Supports portfolio-level (grouped by folder) and folder-scoped
  (grouped by project) views.

  DEFAULT: summary mode (fast, <10 min on large portfolios, derives
  all panels from platform summary endpoints — no per-finding fetch).
  Use --detailed to opt into the legacy per-finding pipeline for
  detection-timeline histograms and Critical/High severity-over-time.
execution_order: 25
auto_run: false  # Only runs when explicitly requested with --recipe

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000

transform_function: executive_dashboard_transform

# Recipe parameters accessible by the transform function
parameters:
  # max_projects: 0 = show all projects/folders (no binning).
  # Set to a positive integer to limit the "Findings by Group" chart
  # to the top N groups, binning the rest into "Other".
  max_projects: 0

output:
  table: true
  formats:
    - html
    - csv
    - xlsx
  charts: []
  has_inline_charts: true

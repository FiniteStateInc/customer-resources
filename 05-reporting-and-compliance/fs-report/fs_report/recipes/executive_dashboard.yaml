name: "Executive Dashboard"
category: assessment  # Current state: shows today's security posture regardless of time period
template: "executive_dashboard.html"
description: >
  Executive-level security dashboard for senior leadership.
  Single-page overview with 13 visualization sections covering findings
  distribution, severity trends, risk scoring, license analysis,
  exploit intelligence, policy health, and finding age.
  Supports portfolio-level (grouped by folder) and folder-scoped
  (grouped by project) views.

  DEFAULT: summary mode (fast, <10 min on large portfolios, derives
  all panels from platform summary endpoints — no per-finding fetch).
  Use --detailed to opt into the legacy per-finding pipeline for
  detection-timeline histograms and Critical/High severity-over-time.
execution_order: 25
auto_run: false  # Only runs when explicitly requested with --recipe

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000

transform_function: executive_dashboard_transform

# Recipe parameters accessible by the transform function
parameters:
  # max_projects: 0 = show all projects/folders (no binning).
  # Set to a positive integer to limit the "Findings by Group" chart
  # to the top N groups, binning the rest into "Other".
  max_projects: 0

output:
  table: true
  formats:
    - html
    - csv
    - xlsx
  charts:
    - name: findings_by_folder
      chart: bar
      stacked: true
      title: "Findings by Folder"
      description: "Distribution of findings across folders by severity"
    - name: findings_by_project
      chart: bar
      stacked: true
      title: "Findings by Project"
      description: "Distribution of findings across projects by severity"
    - name: severity_trends
      chart: line
      title: "Severity Trends (Last 12 Months)"
      description: "Critical and High severity findings over the last 12 months"
    - name: risk_donut
      chart: pie
      title: "Risk Distribution"
      description: "Projects bucketed by highest severity finding"
    - name: open_issues_pie
      chart: pie
      title: "Open Issues by Severity"
      description: "Distribution of unresolved findings by severity level"
    - name: license_bar
      chart: bar
      title: "License Distribution"
      description: "Top 10 licenses by component count"
    - name: policy_health
      chart: bar
      title: "Policy Health"
      description: "Security and license policy violations and warnings"
    - name: exploit_intel
      chart: bar
      title: "Exploit Intelligence"
      description: "Breakdown of exploit-related indicators across CVEs"
    - name: findings_by_type
      chart: bar
      title: "Findings by Type"
      description: "Finding counts categorized by type"
    - name: finding_age
      chart: bar
      title: "Finding Age Distribution"
      description: "Open findings bucketed by age since detection"

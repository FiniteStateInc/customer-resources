name: "Security Progress"
template: "security_progress.html"
category: operational
description: "Version-over-version progress report — CVEs resolved, new CVEs introduced, net change per project and portfolio-wide. Shows what teams accomplished during the period."
execution_order: 30
auto_run: false

query:
  endpoint: "/public/v0/findings"
  params:
    limit: 10000
    sort: "detected:asc"

transform_function: security_progress_transform
output:
  table: true
  formats:
    - csv
    - xlsx
    - html
    - md
  charts:
    - name: "portfolio_trend"
      chart: line
      title: "Open CVEs Over Time"
      description: "Portfolio-wide open CVE count across version releases"
    - name: "cve_changes"
      chart: bar
      title: "CVE Changes This Period"
      description: "New, retracted, severity-escalated, and exploit-updated CVEs"

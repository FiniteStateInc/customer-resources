<!-- ===================== CONFIGURE MODAL (prerun form) ===================== -->
<div class="cfg-ov" id="cfg-ov"></div>
<div id="cfg-modal"></div>

<!-- ===================== COMMAND PALETTE / CHEATSHEET ===================== -->
<div class="ov" id="ov"></div>
<aside class="pal" id="pal">
  <div class="pal-in"><i data-lucide="search"></i><input id="pal-q" placeholder="Run a report, jump to a project, open a view…" autocomplete="off"><span class="esc">esc</span></div>
  <div class="pal-list" id="pal-list"></div>
  <div class="pal-ft"><span class="pal-scope" id="pal-scope"></span><span><b>↑↓</b> navigate</span><span><b>↵</b> run</span><span><b>esc</b> close</span><span style="margin-left:auto"><b>?</b> shortcuts</span></div>
</aside>
<aside class="cheat" id="cheat">
  <h3><i data-lucide="keyboard"></i> Keyboard shortcuts</h3>
  <div class="ck"><span>Command palette</span><span class="cap">⌘K</span></div>
  <div class="ck"><span>Search (slash)</span><span class="cap">/</span></div>
  <div class="ck"><span>Run pinned report</span><span class="cap">R</span></div>
  <div class="ck"><span>Go to Scan Queue</span><span class="cap">G Q</span></div>
  <div class="ck"><span>Go to Reports</span><span class="cap">G R</span></div>
  <div class="ck"><span>Builder</span><span class="cap">G B</span></div>
  <div class="ck"><span>This help</span><span class="cap">?</span></div>
</aside>

{# Compound-bundle chart-library loader.

   Emits the deduplicated union of <script src=...> tags for every chart
   library declared across the bundle's child recipes (via each child's
   Recipe.chart_libraries field). The compound assembler computes the
   union and passes it in as ``compound_libs`` — an ordered list of
   tokens drawn from the Literal allow-list in fs_report.models.Recipe.

   This partial is the explicit alternative to inferring library needs
   from ``output.charts`` / ``has_inline_charts`` — see the compound-
   reports design spec § 2 / § 5 for the rationale (template-only deps
   like ``marked`` / ``dompurify`` on Triage Prioritization are runtime-
   required but not declared in ``output.charts``).

   Token → CDN mapping is identical to the per-recipe templates so a
   compound and a standalone render produce byte-identical script tags.

   First-party readiness helpers (fsEChartsInit, fsReportNewChart,
   window.fsReportReady beacon) are NOT in here — they live in
   _chart_ready.html / _echarts_ready.html and are included directly
   by the compound shell. #}
{% for lib in compound_libs %}
  {%- if lib == "chartjs" %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  {%- elif lib == "datalabels" %}
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  {%- elif lib == "echarts" %}
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  {%- elif lib == "marked" %}
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  {%- elif lib == "dompurify" %}
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  {%- endif %}
{% endfor %}

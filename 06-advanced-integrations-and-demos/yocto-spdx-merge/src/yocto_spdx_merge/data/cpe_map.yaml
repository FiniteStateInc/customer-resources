# Yocto recipe name -> CPE vendor:product mapping
# Used by yocto-spdx-merge to inject externalRefs for CVE correlation.
# Version is injected at merge time from the SPDX package versionInfo.
#
# Format: recipe_name: {vendor: <cpe_vendor>, product: <cpe_product>}
# CPE generated: cpe:2.3:a:<vendor>:<product>:<version>:*:*:*:*:*:*:*
#
# Sub-packages (e.g. busybox-syslog, util-linux-mount) are mapped via
# suffix stripping to their base package entry.

